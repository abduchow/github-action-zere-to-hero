<!DOCTYPE html>
<html>
<head>
    <title>Zakat Calculator</title>
</head>
<body>

<h2>Zakat Calculator</h2>

<form method="POST">

Cash: <input type="number" name="cash" step="0.01"><br><br>

Bank Balance: <input type="number" name="bank" step="0.01"><br><br>

Gold Value: <input type="number" name="gold" step="0.01"><br><br>

Investments: <input type="number" name="investments" step="0.01"><br><br>

Debts: <input type="number" name="debts" step="0.01"><br><br>

<button type="submit">Calculate Zakat</button>

</form>

{% if zakat is not none %}
<h3>Your Zakat: ${{ zakat }}</h3>
{% endif %}

</body>
</html>
